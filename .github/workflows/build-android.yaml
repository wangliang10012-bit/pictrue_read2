name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix buildozer.spec
        run: |
          if [ -f buildozer.spec ]; then
            sed -i 's/android\.arch =/android.archs =/g' buildozer.spec
            sed -i 's/android\.arch=/android.archs=/g' buildozer.spec
          fi

      - name: Build APK
        uses: kivy/buildozer-action@v1
        with:
          buildozer-spec: buildozer.spec

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk