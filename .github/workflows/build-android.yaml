name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Fix buildozer.spec
        run: |
          # 自动修复 android.arch 到 android.archs
          if [ -f buildozer.spec ]; then
            sed -i 's/android\.arch =/android.archs =/g' buildozer.spec
            sed -i 's/android\.arch=/android.archs=/g' buildozer.spec
            echo "✓ Fixed android.archs in buildozer.spec"
            cat buildozer.spec | grep "archs"
          else
            echo "buildozer.spec not found!"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36 pillow kivy==2.1.0

      - name: Build APK with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
