name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix buildozer.spec
        run: |
          # 自动修复 android.arch 问题
          if [ -f buildozer.spec ]; then
            sed -i 's/android\.arch =/android.archs =/g' buildozer.spec
            sed -i 's/android\.arch=/android.archs=/g' buildozer.spec
            echo "✓ Fixed android.archs in buildozer.spec"
          fi

      - name: Build APK with Docker
        run: |
          # 使用官方镜像，通过管道自动接受许可证提示
          docker run --rm \
            -v $(pwd):/home/user/hostcwd \
            -v ~/.buildozer:/home/user/.buildozer \
            kivy/buildozer \
            bash -c "yes | buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk