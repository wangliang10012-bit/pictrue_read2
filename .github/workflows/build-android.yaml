name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Buildozer (GHCR)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v ~/.buildozer:/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk