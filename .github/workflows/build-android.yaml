name: Build Android APK with Working Docker Image

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 关键修复步骤：使用社区维护的 'tshirtman/buildozer' 镜像
      - name: Build APK with Buildozer in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/buildozer \
            -v ~/.buildozer:/home/user/.buildozer \
            tshirtman/buildozer \
            buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ github.workspace }}/bin/*.apk