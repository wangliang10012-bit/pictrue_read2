name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      PATH: ${{ github.workspace }}/android-sdk/cmdline-tools/latest/bin:${{ github.workspace }}/android-sdk/platform-tools:${{ github.workspace }}/android-sdk/build-tools/31.0.0:${{ env.PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Android SDK
        run: |
          # 创建 SDK 目录
          mkdir -p ${{ env.ANDROID_HOME }}/cmdline-tools
          
          # 下载并安装命令行工具
          cd ${{ env.ANDROID_HOME }}/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          
          # 接受许可证并安装必要组件
          yes | sdkmanager --licenses >/dev/null 2>&1
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"
          
          # 验证 aidl 是否安装
          echo "=== Checking aidl ==="
          ls -la ${{ env.ANDROID_HOME }}/build-tools/31.0.0/aidl
          echo "aidl is available!"

      - name: Fix buildozer.spec
        run: |
          # 修复 android.arch 到 android.archs
          if [ -f buildozer.spec ]; then
            sed -i 's/android\.arch =/android.archs =/g' buildozer.spec
            sed -i 's/android\.arch=/android.archs=/g' buildozer.spec
            # 确保 android.api 设置为 31
            sed -i 's/android\.api = .*/android.api = 31/' buildozer.spec
            echo "✓ Fixed buildozer.spec"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36 pillow kivy==2.1.0

      - name: Build APK with Buildozer
        run: |
          # 验证环境
          echo "=== Environment Check ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "aidl location:"
          ls -la $ANDROID_HOME/build-tools/31.0.0/aidl
          
          # 确保 buildozer.spec 存在
          if [ ! -f buildozer.spec ]; then
            echo "Error: buildozer.spec not found!"
            exit 1
          fi
          
          # 开始打包
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
