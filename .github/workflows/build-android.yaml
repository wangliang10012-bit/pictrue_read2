name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Android SDK
        run: |
          # 下载并安装 Android SDK 命令行工具
          mkdir -p $HOME/Android/Sdk/cmdline-tools
          cd $HOME/Android/Sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          
          # 设置环境变量
          export ANDROID_HOME=$HOME/Android/Sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # 接受许可证并安装必要组件
          yes | sdkmanager --licenses >/dev/null 2>&1
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"
          
          # 验证 aidl 是否安装
          echo "Checking aidl..."
          ls -la $ANDROID_HOME/build-tools/31.0.0/aidl

      - name: Fix buildozer.spec
        run: |
          # 修复 android.arch 到 android.archs
          if [ -f buildozer.spec ]; then
            sed -i 's/android\.arch =/android.archs =/g' buildozer.spec
            sed -i 's/android\.arch=/android.archs=/g' buildozer.spec
            echo "✓ Fixed android.archs"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36 pillow kivy==2.1.0

      - name: Build APK with Buildozer
        env:
          ANDROID_HOME: ${{ github.workspace }}/../Android/Sdk
          ANDROID_SDK_ROOT: ${{ github.workspace }}/../Android/Sdk
        run: |
          # 设置 ANDROID_HOME
          export ANDROID_HOME=$HOME/Android/Sdk
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          
          # 验证环境
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "aidl location:"
          ls -la $ANDROID_HOME/build-tools/31.0.0/aidl
          
          # 开始打包
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
