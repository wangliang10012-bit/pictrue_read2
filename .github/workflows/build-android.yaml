name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython pillow kivy

      - name: Fix buildozer.spec (if needed)
        run: |
          if [ -f buildozer.spec ]; then
            # 修复常见的 android.arch 问题
            sed -i 's/android\.arch =/android.archs =/g' buildozer.spec
            sed -i 's/android\.arch=/android.archs=/g' buildozer.spec
          fi

      - name: Initialize buildozer
        run: |
          # 如果不存在 buildozer.spec，创建一个
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

      - name: Build APK
        env:
          ANDROID_HOME: ${{ github.workspace }}/.buildozer/android/platform/android-sdk
        run: |
          # 运行 buildozer（第一次运行会自动下载 SDK 和 NDK）
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk