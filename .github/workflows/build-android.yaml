name: Build Android APK with Docker

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 核心步骤：使用 Kivy 官方 Docker 镜像进行构建
      - name: Build APK with Buildozer in Docker
        run: |
          # 运行官方 Docker 镜像
          # 1. 将当前项目目录挂载到容器内的工作目录
          # 2. 将宿主机的 ~/.buildozer 目录挂载到容器内，用于缓存 SDK/NDK，加速后续构建
          # 3. 执行构建命令
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v ~/.buildozer:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # 构建好的 APK 文件会出现在项目目录下的 bin 文件夹中
          path: ${{ github.workspace }}/bin/*.apk