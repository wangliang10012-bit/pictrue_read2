name: Build Android APK with Fresh Docker Image

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout buildozer source
        uses: actions/checkout@v4
        with:
          repository: kivy/buildozer
          path: buildozer-src

      - name: Build fresh Docker image from source
        run: |
          cd buildozer-src
          docker build --tag=kivy/buildozer:local .

      - name: Build APK with fresh Docker image
        run: |
          # 使用刚刚构建的新镜像，带缓存挂载
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v ~/.buildozer:/home/user/.buildozer \
            kivy/buildozer:local \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ github.workspace }}/bin/*.apk