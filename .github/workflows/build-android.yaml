name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install Android SDK
        run: |
          # 安装 Android SDK 命令行工具
          mkdir -p /opt/android-sdk/cmdline-tools
          cd /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          
      - name: Install Android Build Tools
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # 接受许可证
          yes | sdkmanager --licenses >/dev/null 2>&1
          
          # 安装必要的组件
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"
          sdkmanager "ndk;25.2.9519653"
          
      - name: Fix buildozer.spec
        run: |
          # 修改 buildozer.spec，使用 android.archs 替代 android.arch
          sed -i 's/android.arch =/android.archs =/g' buildozer.spec
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython pillow kivy==2.2.0
          
      - name: Build APK with Buildozer
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
          ANDROID_NDK_HOME: /opt/android-sdk/ndk/25.2.9519653
        run: |
          # 确保 buildozer.spec 存在
          if [ ! -f buildozer.spec ]; then
            echo "buildozer.spec not found!"
            exit 1
          fi
          
          # 开始打包
          buildozer -v android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
