<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国工商银行</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* 顶部状态栏模拟 */
        .status-bar {
            background: #fff;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }

        /* 用户卡片 */
        .user-card {
            background: #fff;
            padding: 20px;
            margin-bottom: 10px;
        }
        .user-info { font-size: 16px; font-weight: bold; }
        .login-time { font-size: 12px; color: #666; margin-top: 5px; }

        /* 菜单图标区 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 15px;
            background: #fff;
            margin-bottom: 10px;
            text-align: center;
        }
        .menu-item { font-size: 12px; color: #333; }
        .icon-placeholder { width: 40px; height: 40px; background: #e0e0e0; border-radius: 50%; margin: 0 auto 5px; }

        /* 资产负债卡片 (核心部分) */
        .assets-card {
            background: linear-gradient(135deg, #c31432, #240b36); /* 模拟工行红黑渐变 */
            color: #fff;
            padding: 25px 20px;
            margin: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .label { font-size: 14px; opacity: 0.8; }
        .amount-large { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .loan-amount {
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #ddd;
        }
        .nav-item { font-size: 12px; color: #999; text-align: center; }
        .nav-item.active { color: #c31432; }

        /* 点击反馈 */
        .clickable { cursor: pointer; transition: opacity 0.2s; }
        .clickable:active { opacity: 0.7; }
    </style>
</head>
<body>

    <!-- 状态栏 -->
    <div class="status-bar">
        <span>中国工商银行</span>
        <span>消息 🔔</span>
    </div>

    <!-- 用户信息 -->
    <div class="user-card">
        <div class="user-info">欢迎您，尊贵的用户</div>
        <div class="login-time" id="loginTime">上次登录: 加载中...</div>
    </div>

    <!-- 菜单区 -->
    <div class="menu-grid">
        <div class="menu-item"><div class="icon-placeholder"></div>账户</div>
        <div class="menu-item"><div class="icon-placeholder"></div>转账</div>
        <div class="menu-item"><div class="icon-placeholder"></div>理财</div>
        <div class="menu-item"><div class="icon-placeholder"></div>贷款</div>
        <div class="menu-item"><div class="icon-placeholder"></div>更多</div>
    </div>

    <!-- 资产负债卡片 (可点击跳转) -->
    <div class="assets-card clickable" onclick="alert('准备跳转到第二页：住房贷款详情')">
        <div class="label">我的负债总额 (元)</div>
        <div class="amount-large">512,922.29</div>
        <div class="label">其中贷款余额</div>
        <div class="loan-amount">512,922.29</div>
    </div>

    <div style="height: 60px;"></div> <!-- 占位符，防止内容被底部导航遮挡 -->

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active">首页</div>
        <div class="nav-item">财富</div>
        <div class="nav-item">生活</div>
        <div class="nav-item">我的</div>
    </div>

    <script>
        // 模拟动态时间更新
        function updateTime() {
            const now = new Date();
            const timeString = now.getFullYear() + "-" +
                String(now.getMonth() + 1).padStart(2, '0') + "-" +
                String(now.getDate()).padStart(2, '0') + " " +
                String(now.getHours()).padStart(2, '0') + ":" +
                String(now.getMinutes()).padStart(2, '0');
            document.getElementById('loginTime').innerText = "上次登录: " + timeString;
        }
        updateTime();
        setInterval(updateTime, 60000); // 每分钟更新
    </script>
</body>
</html>
