<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, target-densitydpi=device-dpi">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <title>中国工商银行</title>

<body class="index-page">

    <!-- 状态栏 -->
    <div class="image-container">
        <img src="pictures/设置_消息_按钮.png" class="main-image" alt="状态栏">
    </div>

    <!-- 个人信息 -->
    <div class="image-container">
        <img src="pictures/个人信息.png" class="main-image" alt="个人信息">
        <img src="pictures/权益中心下时间的覆盖色.png" class="cover-image" style="top: 41.8%; left: 26.6%; width: 59.0%; height: 9.5%;" alt="">
        <div class="overlay-text gray-text" id="loginTime" style="top: 41.8%; left: 26.6%; font-size: 0.8rem;">

    <!-- 菜单 -->

        <div class="overlay-text gray-text" id="currentTime" style="top: 6.8%; left: 8%; font-size: 0.7rem;">

        <div class="cover-bg" style="top: 41.5%; left: 55.0%; width: 37.9%; height: 11.8%;"></div>
        <div class="overlay-text" style="top: 42.5%; left: 55.0%; font-size: 1.6rem;">
            512,922.29
        </div>

        <!-- 贷款金额覆盖层 -->
        <img src="pictures/贷款进度底色.png" class="cover-image" style="top: 68.4%; left: 62.0%; width: 22.9%; height: 7.1%;" alt="">
        <div class="overlay-text" style="top: 68.0%; left: 62.0%; font-size: 0.95rem;">
            512,922.29
        </div>
    </div>

    <!-- 本月收支 -->
    <div class="image-container">
        <img src="pictures/我的本月收支.png" class="main-image" alt="本月收支">
    </div>

    <!-- 底部导航 -->
    <div class="image-container">
        <img src="pictures/底部按钮.png" class="main-image" alt="底部导航">
    </div>

    <script src="script.js"></script>
